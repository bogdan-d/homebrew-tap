name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@225e0592b0c9d7d41530f7080ba12b5c643ae2e5 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-24.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-24.04-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - name: Run Linux tap syntax checks
        run: |
          set -euo pipefail

          # `brew test-bot --only-tap-syntax` hardcodes `brew readall --os=all --arch=all`
          # which loads casks under macOS before Linux validation. That breaks Linux-only
          # casks that use top-level `x86_64_linux`/`arm64_linux` sha256 stanzas needed by
          # the bump workflow, so validate this tap explicitly in Linux mode instead.
          TAP_FULL_NAME="${GITHUB_REPOSITORY}"
          TAP_NAME="$(brew ruby -e 'require "tap"; puts Tap.fetch(ARGV.first).name' "$TAP_FULL_NAME")"

          brew style "$TAP_NAME"

          mapfile -t formulae < <(
            brew ruby -e 'require "tap"; tap = Tap.fetch(ARGV.first); puts tap.formula_files.map { |f| "#{tap.name}/#{f.basename(".rb")}" }' "$TAP_FULL_NAME"
          )
          if [ "${#formulae[@]}" -gt 0 ]; then
            brew audit --os=linux --arch=all --formula --except=installed "${formulae[@]}"
          fi

          mapfile -t casks < <(
            brew ruby -e 'require "tap"; tap = Tap.fetch(ARGV.first); puts tap.cask_files.map { |f| "#{tap.name}/#{f.basename(".rb")}" }' "$TAP_FULL_NAME"
          )
          for cask in "${casks[@]}"; do
            brew audit --os=linux --arch=all --cask "$cask"
          done

  test-bot:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@225e0592b0c9d7d41530f7080ba12b5c643ae2e5 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-formulae

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'