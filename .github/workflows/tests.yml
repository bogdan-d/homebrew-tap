name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-24.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-24.04-rubygems-

      - name: Install Bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
          sudo sysctl -w user.max_user_namespaces=28633 2>/dev/null || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true

      - run: brew trust bogdan-d/tap

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  test-bot:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Install Bubblewrap
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Enable unprivileged user namespaces
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
          sudo sysctl -w user.max_user_namespaces=28633 2>/dev/null || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true

      - run: brew trust bogdan-d/tap

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-formulae

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'